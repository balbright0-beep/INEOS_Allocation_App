<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INEOS Allocation Tool - Upload</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #FAFAF9; color: #1D1D1D; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background: #171717; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .logo { width: 36px; height: 36px; background: #FF4639; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .nav-title { font-size: 16px; font-weight: 600; }
    .nav-sub { font-size: 11px; color: #9F9F9F; text-transform: uppercase; letter-spacing: 0.5px; }
    .nav-right { margin-left: auto; }
    .nav-right a { color: #D9D7D0; text-decoration: none; font-size: 14px; }
    .nav-right a:hover { color: #fff; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .card { background: #fff; border: 1px solid #E9E8E5; border-radius: 12px; padding: 40px; max-width: 520px; width: 100%; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #606060; font-size: 14px; margin-bottom: 28px; }
    .drop-zone { border: 2px dashed #D9D7D0; border-radius: 10px; padding: 48px 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .drop-zone:hover, .drop-zone.dragover { border-color: #FF4639; background: #FFF5F4; }
    .drop-zone svg { margin-bottom: 12px; color: #9F9F9F; }
    .drop-zone p { color: #606060; font-size: 14px; }
    .drop-zone .browse { color: #FF4639; font-weight: 500; text-decoration: underline; cursor: pointer; }
    #file-input { display: none; }
    .file-name { margin-top: 12px; font-size: 13px; color: #1D1D1D; font-weight: 500; }
    .btn { display: block; width: 100%; margin-top: 20px; padding: 12px; background: #FF4639; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn:hover { background: #e63e32; }
    .btn:disabled { background: #D9D7D0; cursor: not-allowed; }
    .status { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 13px; text-align: center; }
    .status.processing { background: #FFF8E1; color: #B8860B; }
    .status.ready { background: #E8F5E9; color: #2C931E; }
    .status.error { background: #FFEBEE; color: #CC0200; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #B8860B; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .last-refresh { margin-top: 16px; font-size: 12px; color: #9F9F9F; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <div class="logo">IN</div>
    <div>
      <div class="nav-title">INEOS Automotive</div>
      <div class="nav-sub">Allocation Tool</div>
    </div>
    <div class="nav-right">
      <a href="/">View Allocations</a>
    </div>
  </nav>
  <main>
    <div class="card">
      <h1>Upload Master File</h1>
      <p class="subtitle">Upload the Master File V14 (.xlsb) to refresh the Allocation Tool.</p>
      <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data">
        <div class="drop-zone" id="drop-zone">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/>
          </svg>
          <p>Drag & drop your Master File here, or <span class="browse">browse</span></p>
          <div class="file-name" id="file-name"></div>
          <input type="file" name="file" id="file-input" accept=".xlsb,.xlsx,.xls">
        </div>
        <button type="submit" class="btn" id="submit-btn" disabled>Upload & Refresh Allocations</button>
      </form>
      <div id="status-box" style="display:none" class="status"></div>
      {% if status.last_refresh %}
      <div class="last-refresh">Last refresh: {{ status.last_refresh }}</div>
      {% endif %}
    </div>
  </main>
  <script>
    const dropZone=document.getElementById('drop-zone'),fileInput=document.getElementById('file-input'),fileName=document.getElementById('file-name'),submitBtn=document.getElementById('submit-btn'),statusBox=document.getElementById('status-box'),form=document.getElementById('upload-form');
    dropZone.addEventListener('click',()=>fileInput.click());
    dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
    dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length){fileInput.files=e.dataTransfer.files;onFileSelected()}});
    fileInput.addEventListener('change',onFileSelected);
    function onFileSelected(){if(fileInput.files.length){const f=fileInput.files[0];fileName.textContent=f.name+' ('+(f.size/1024/1024).toFixed(1)+' MB)';submitBtn.disabled=false}}
    form.addEventListener('submit',()=>{submitBtn.disabled=true;submitBtn.textContent='Uploading...'});
    const params=new URLSearchParams(window.location.search);
    if(params.get('processing')==='1'){statusBox.style.display='block';statusBox.className='status processing';statusBox.innerHTML='<span class="spinner"></span> Processing Master File... This may take 2-3 minutes.';pollStatus()}
    function pollStatus(){fetch('/status').then(r=>r.json()).then(data=>{if(data.state==='ready'){statusBox.className='status ready';statusBox.textContent='Allocations refreshed! Redirecting...';setTimeout(()=>window.location.href='/',1500)}else if(data.state==='error'){statusBox.className='status error';statusBox.textContent='Error: '+(data.error||'Unknown error')}else if(data.state==='processing'){setTimeout(pollStatus,3000)}})}
  </script>
</body>
</html>
